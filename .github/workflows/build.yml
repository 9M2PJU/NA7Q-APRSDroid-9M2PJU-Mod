name: Build

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest
    # Signing requires secrets; skip on forks (e.g. PRs from contributors)
    # where secrets are not available.
    if: ${{ !github.event.pull_request.head.repo.fork }}

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.parallel=true

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0   # git describe needs tags/history for versionName

      - name: Set up JDK 17 (for Android SDK setup)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" --install \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33"

      - name: Switch to JDK 11 (for Scala 2.11 + modern AndroidX)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'

      - name: Write local.properties
        run: |
          # mapsApiKey is optional; falls back to upstream's restricted key
          if [ -n "${{ secrets.MAPS_API_KEY }}" ]; then
            echo "mapsApiKey=${{ secrets.MAPS_API_KEY }}" >> local.properties
          fi
          # Accept any SDK licenses just in case
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Run lint
        run: ./gradlew lintRelease

      - name: Fail early if signing secrets are missing
        env:
          KS_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KS_KEYPASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$KS_B64" ]    && missing+=('RELEASE_KEYSTORE_BASE64')
          [ -z "$KS_PASS" ]   && missing+=('RELEASE_STORE_PASSWORD')
          [ -z "$KS_ALIAS" ]  && missing+=('RELEASE_KEY_ALIAS')
          [ -z "$KS_KEYPASS" ] && missing+=('RELEASE_KEY_PASSWORD')
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required signing secrets: ${missing[*]}"
            echo "::error::Add them under Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Decode release keystore
        id: keystore
        run: |
          keystore_path="$RUNNER_TEMP/release.keystore"
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$keystore_path"
          echo "path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: ${{ steps.keystore.outputs.path }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PRELEASE_STORE_FILE="$RELEASE_STORE_FILE" \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"

      - name: Verify APK is signed
        run: |
          apk=$(find build/outputs/apk/release -name '*.apk' ! -name '*-unsigned.apk' | head -1)
          if [ -z "$apk" ]; then
            echo "::error::No signed release APK found"
            find build/outputs/apk -type f
            exit 1
          fi
          echo "Signed APK: $apk"
          "$ANDROID_SDK_ROOT/build-tools/33.0.2/apksigner" verify --print-certs "$apk" | head -20

      - name: Verify signer identity
        run: |
          apk=$(find build/outputs/apk/release -name '*.apk' ! -name '*-unsigned.apk' | head -1)
          dn=$("$ANDROID_SDK_ROOT/build-tools/33.0.2/apksigner" verify --print-certs "$apk" \
            | grep -i 'DN:' | head -1)
          echo "Signer DN: $dn"
          if echo "$dn" | grep -q "HamRadio.my"; then
            echo "::notice::APK signed by HamRadio.my organization key"
          else
            echo "::warning::APK signer DN does not contain 'HamRadio.my': $dn"
          fi

      - name: Stage release APK
        run: |
          mkdir -p artifacts
          apk=$(find build/outputs/apk/release -name '*.apk' ! -name '*-unsigned.apk' | head -1)
          tag="${GITHUB_REF_NAME:-untagged}"
          out="artifacts/APRSdroid-9M2PJU-Mod-${tag}.apk"
          cp "$apk" "$out"
          ls -la artifacts/

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: apk-release
          path: artifacts/APRSdroid-9M2PJU-Mod-*.apk
          if-no-files-found: error

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lint-reports
          path: |
            build/reports/lint-results-*.html
            build/reports/lint-results-*.xml
          if-no-files-found: warn

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download release APK
        uses: actions/download-artifact@v5
        with:
          name: apk-release
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}-9M2PJU
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*.apk
